      (leetspeak for "misanthropy") to cell phones across multiple states including
      Paraná, São Paulo, and Rio de Janeiro. Brazilian authorities took the Cellbroadcast
      platform offline and are investigating the origin of the false alerts, which
      were not issued by any civil defense agency.
