    summary_zh: 许多Web开发者对CORS的工作原理存在误解，Zoom的本地Web服务器漏洞就是典型案例——工程师通过图片尺寸编码的方式绕过跨域限制，而非正确设置Access-Control-Allow-Origin响应头。这一事件揭示了行业中普遍存在的问题：开发者倾向于绕过浏览器安全策略而非学习正确使用，且经常从Stack
      Overflow上复制不安全的默认配置。
    content_file: developers-don-t-understand-cors-2019.md
    summary: Many web developers misunderstand how CORS works, as illustrated by Zoom's
      localhost web server vulnerability where engineers built an image-dimension
      hack to bypass cross-origin restrictions instead of properly setting Access-Control-Allow-Origin
      headers. The incident highlights a widespread industry problem where developers
      circumvent browser security policies rather than learning to use them correctly,
      often copying insecure defaults from Stack Overflow answers.
  - url: https://www.sciencedaily.com/releases/2026/06/260614012006.htm
    title: Your brain was never designed for this much bad news
    score: 272
    comment_cnt: 244
    comment_url: https://news.ycombinator.com/item?id=48615569
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 人类在进化中形成了对负面信息的高度敏感，这种机制曾帮助祖先在威胁中存活，但如今却导致大脑被全球范围内持续不断的坏消息淹没，全球已有40%的人至少有时会主动回避新闻。研究人员建议通过限定阅读时段、注重深度而非数量、将关注转化为行动以及识别"愤怒诱饵"来管理新闻消费，而非完全回避——因为完全回避会损害公民知情权。
    content_file: your-brain-was-never-designed-for-this-much-bad-news.md
    summary: Humans evolved a negativity bias that helped ancestors survive threats,
      but this same wiring now causes "news fatigue" as brains are overwhelmed by
      a constant global stream of bad news, with 40% of people worldwide now avoiding
      news at least sometimes. Researchers recommend managing consumption through
      timed windows, choosing depth over volume, linking awareness to action, and
      recognizing rage bait—rather than disengaging entirely, which undermines informed
      citizenship.
  - url: https://www.phoronix.com/news/Linux-7.2-Drops-strncpy
    title: Linux eliminates the strncpy API after six years of work, 360 patches
    score: 261
    comment_cnt: 283
    comment_url: https://news.ycombinator.com/item?id=48612943
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: Linux 7.2 经过六年努力和约 362 次提交，终于从内核中彻底移除了 strncpy API，消除了该函数因 NUL 终止语义反直觉和冗余零填充导致的长期
      bug 来源。内核代码现应根据场景使用 strscpy()、strscpy_pad()、strtomem_pad()、memcpy_and_pad()
      或 memcpy() 等更安全的替代函数。
    content_file: linux-eliminates-the-strncpy-api-after-six-years-of-work-360.md
    summary: Linux 7.2 has fully eliminated the strncpy API from the kernel after
      six years of effort and approximately 362 commits, removing a long-standing
      source of bugs caused by its counter-intuitive NUL-termination semantics and
      inefficient zero-filling behavior. Kernel code should now use safer alternatives
      such as strscpy(), strscpy_pad(), strtomem_pad(), memcpy_and_pad(), or memcpy()
      depending on the use case.
  - url: https://sibexi.co/posts/epoll-vs-io_uring/
    title: Epoll vs. io_uring in Linux
    score: 224
    comment_cnt: 52
    comment_url: https://news.ycombinator.com/item?id=48613872
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 本文比较了 Linux 的两种异步 I/O 机制——epoll（2002年）和 io_uring（2019年），解释了 epoll
      基于就绪通知的模型每次 I/O 事件需要两次系统调用，而 io_uring 基于完成通知的模型通过共享环形缓冲区批量处理操作，大幅减少了内核态切换开销。作者通过重写反向代理项目
      TinyGate 的实践经验，得出结论：对于现代内核（5.1+）上的新项目，io_uring 是明确的首选，它还提供零拷贝 I/O 和 SQPOLL 等特性，可实现接近零系统调用的开销。
    content_file: epoll-vs-io-uring-in-linux.md
    summary: The article compares Linux's two asynchronous I/O mechanisms—epoll (2002)
      and io_uring (2019)—explaining how epoll's readiness-based model requires two
      syscalls per I/O event while io_uring's completion-based model batches operations
      through shared ring buffers, drastically reducing kernel boundary crossings.
      Through the author's experience rewriting their reverse proxy TinyGate, they
      conclude that io_uring is the clear choice for new projects on modern kernels
      (5.1+), offering features like zero-copy I/O and SQPOLL for near-zero syscall
      overhead.
