      from Windows 2.11 (1989) through Windows 10 (2015), showing the evolution from
      a simple "not executable" error to progressively richer dialogs for choosing
      or finding an associated program. Notable stops include Windows 95's inline
      program picker, XP's ill-fated web-service nudge (shut down in 2006), and Windows
      10's flat, less-obviously-interactive "Store" integration.
  - url: https://alexkritchevsky.com/2024/02/28/geometric-algebra.html
    title: The case against geometric algebra (2024)
    score: 97
    comment_cnt: 83
    comment_url: https://news.ycombinator.com/item?id=48617782
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 本文认为，几何代数虽然确实解决了数学教学和应用中的一些实际问题，但其过度依赖几何积以及社区中缺乏自我批评的狂热文化，严重阻碍了它的发展。作者指出，真正有用的核心概念——多重向量和楔积——源自外代数且已逐渐被主流数学接纳，几何代数需要修正自身的结构性缺陷，而非以当前形态继续传教式推广。
    content_file: the-case-against-geometric-algebra-2024.md
    summary: The article argues that Geometric Algebra, while addressing real shortcomings
      in how math is taught and used, is held back by its over-reliance on the geometric
      product and a zealous community culture that discourages self-criticism and
      structural improvement. The author contends that the useful core ideas—multivectors
      and the wedge product from Exterior Algebra—are already gaining traction in
      mainstream mathematics, and GA needs to fix its foundational issues rather than
      evangelize its current form.
  - url: https://kevinak.se/blog/who-actually-owns-your-atproto-identity-hint-its-probably-not-you
    title: 'Who Owns Your ATProto Identity? Hint: It''s Probably Not You'
    score: 94
    comment_cnt: 82
    comment_url: https://news.ycombinator.com/item?id=48619140
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: ATProto 的架构赋予 PDS（个人数据服务器）运营者对用户签名密钥和轮换密钥的完全控制权，使其能够在所有 ATProto 应用中冒充用户身份，或彻底吊销用户身份——其影响范围远超传统平台被入侵的后果。作者主张应在账户创建流程中默认注册用户自控的备份轮换密钥，并为用户提供更好的工具来审计
