      AI adoption has moved past the free-spending phase into a harder reckoning with
      unmeasurable ROI, uncontrolled token costs, and a growing gap between code generation
      speed and human review capacity. The discussion surfaced a new concern—"cognitive
      debt"—where AI-accelerated feature output creates maintenance burdens that outpace
      teams' ability to understand and manage what they've shipped.
