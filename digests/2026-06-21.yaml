    summary_zh: 芬兰正在重新定义公共图书馆，将其打造为社区服务中心，市民可以借用从缝纫机到音乐录音室的各种资源，超过55%的芬兰人每月至少访问一次图书馆，远超美国和英国的平均水平。研究表明，这一模式以法律为保障、人均投入65.78欧元，通过促进社会包容、数字化服务和公共讨论来强化民主，每投入一美元可产生三到五美元的回报。
