    summary_zh: Bun 创始人 Jarred Sumner 提交了一个实验性 PR（#249），为 JavaScriptCore 添加共享内存线程支持，包含多线程堆管理、每线程分配器、TID/共享写标记蝶形数组、N
      线程安全点、JIT 多层级支持以及 Thread/Lock/Condition/ThreadLocal API。该实现包含 151 个提交、TSAN 集成、竞态放大器和
      85 个测试用例，目前尚不可用，通过 --useJSThreads 标志启用并保留 GIL 回退层。
    content_file: bun-has-an-open-pr-adding-shared-memory-threads-to-javascrip.md
    summary: Bun creator Jarred Sumner has opened an experimental pull request (#249)
      to add shared-memory thread support to JavaScriptCore, featuring a multi-mutator
      heap with per-thread allocators, TID/shared-write tagged butterflies, JIT tier
      support under N mutators, and a Thread/Lock/Condition/ThreadLocal API. The implementation,
      which includes 151 commits, TSAN integration, a race amplifier, and an 85-test
      corpus, remains non-functional and is gated behind the --useJSThreads flag with
      a GIL fallback layer.
