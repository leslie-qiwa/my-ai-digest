      instead of MuPDF, and supports reusable effect presets through a TOML config
      file.
  - url: https://lcamtuf.substack.com/p/the-100000-whys-of-ai
    title: The 100k Whys of AI
    score: 132
    comment_cnt: 77
    comment_url: https://news.ycombinator.com/item?id=48616017
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 在亚马逊搜索"100000 whys"会出现约150本几乎一模一样的AI生成儿童书籍——相同的书名、相同的封面元素、甚至高度相似的作者姓氏——这充分展示了大语言模型准确定性输出在大规模下产生的明显模式。作者认为，虽然单条AI生成的句子可能与人类写作难以区分，但大量提示下选择的统计聚类使得AI生成内容在整体上可被识别，并正在瓦解传统的在线内容互动模式。
    content_file: the-100k-whys-of-ai.md
    summary: A search for "100,000 Whys" on Amazon reveals roughly 150 near-identical
      AI-generated children's books — same titles, same cover motifs, even suspiciously
      similar author surnames — illustrating how LLMs' quasi-deterministic outputs
      create unmistakable patterns at scale. The author argues that while individual
      AI-written sentences may be indistinguishable from human prose, the statistical
      clustering of choices across many prompts makes AI-generated content collectively
      identifiable, undermining traditional models of online content creation.
