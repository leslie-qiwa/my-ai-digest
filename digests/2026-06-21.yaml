  - url: https://www.sciencedaily.com/releases/2026/06/260617032207.htm
    title: The ability to regrow body parts is dormant in mammals, not lost
    score: 188
    comment_cnt: 66
    comment_url: https://news.ycombinator.com/item?id=48611083
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 德克萨斯A&M大学的科学家证明，哺乳动物可能拥有处于休眠状态的再生能力，通过依次使用FGF2和BMP2两种生长因子的两步疗法可以重新激活这种能力，在动物实验中成功再生了截肢后的骨骼、关节、韧带和肌腱。该方法将身体的自然愈合反应从瘢痕形成重新导向组织再生，无需外源干细胞，且两种生长因子已在临床使用或试验中，有望缩短走向人类应用的路径。
    content_file: the-ability-to-regrow-body-parts-is-dormant-in-mammals-not-l.md
    summary: Scientists at Texas A&M University have demonstrated that mammals may
      possess dormant regenerative abilities that can be reactivated using a sequential
      two-step treatment with growth factors FGF2 and BMP2, successfully regrowing
      bone, joints, ligaments, and tendons after amputation in animal studies. The
      approach redirects the body's natural healing response away from scar formation
      and toward tissue regeneration without requiring external stem cells, and both
      growth factors are already in clinical use or trials, potentially shortening
      the path to human applications.
