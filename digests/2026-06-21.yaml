    summary_zh: 据报道，黑客于周六入侵了巴西国家紧急警报系统，向巴拉那州、圣保罗州和里约热内卢等多个州的手机发送了包含"misantropi4"（"厌世"一词的黑客拼写）的未经授权的"极端"警报。巴西当局已将Cellbroadcast平台下线，并正在调查虚假警报的来源，各级民防机构均确认未发送该警报。
