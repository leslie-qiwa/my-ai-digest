    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 作者认为，AI辅助编程的真正瓶颈不在于代码生成，而在于审查AI生成的代码，并分享了拒绝AI代码的具体标准——例如当改动范围超过问题本身，或引入了不必要的抽象。作者强调，编程智能体仍然需要经验丰富的工程师来引导其产出优质方案，通过CI测试的可运行代码并不等同于良好的工程解决方案。
    content_file: when-i-reject-ai-code-even-if-it-works.md
    summary: The author argues that the real bottleneck in AI-assisted coding is reviewing
      generated code, not writing it, and shares specific criteria for rejecting AI
      output—such as when the diff exceeds the problem scope or introduces premature
      abstractions. They emphasize that coding agents still require experienced engineers
      to guide them toward good solutions, and that working code passing CI does not
      equate to a well-engineered solution.
