    summary_zh: 本文以图文形式回顾了从 Windows 2.11（1989）到 Windows 10（2015）打开未知扩展名文件时系统对话框的演变历程——从简单的"不可执行"报错，逐步发展为功能日趋丰富的程序关联选择界面。其中值得关注的节点包括
      Windows 95 的内联程序选择器、XP 那个不太成功的网络查询服务（2006 年已关闭），以及 Windows 10 扁平化但交互提示不够明显的"应用商店"集成。
