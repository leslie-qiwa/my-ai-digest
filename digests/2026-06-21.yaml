    content_file: who-owns-your-atproto-identity-hint-it-s-probably-not-you.md
    summary: ATProto's architecture gives PDS (Personal Data Server) operators full
      control over users' signing and rotation keys, enabling them to impersonate
      users across every ATProto application or revoke their identity entirely—far
      exceeding the blast radius of traditional platform compromises. The author argues
      that self-controlled backup rotation keys should be enrolled by default during
      account creation, and users need better tools to audit PDS-signed activity.
